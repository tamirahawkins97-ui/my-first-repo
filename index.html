<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        background-image: url("https://images.unsplash.com/photo-1500534623283-312aade485b7?auto=format&fit=crop&w=1600&q=80");
        background-size: cover;
        background-position: center;
        color: #222;
      }

      nav {
        background-color: rgba(51, 51, 51, 0.9);
        padding: 1rem;
      }

      .menu {
        display: flex;
        gap: 1.5rem;
        list-style: none;
      }

      .menu a {
        color: white;
        text-decoration: none;
        font-weight: 500;
      }

      .menu a:hover {
        text-decoration: underline;
      }

      .content {
        max-width: 900px;
        margin: 2rem auto;
        padding: 2rem;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 12px;
      }

      .bee-image {
        display: block;
        width: 220px;
        margin: 1rem 0;
      }

      footer {
        padding: 1rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <nav>
      <ul class="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <div class="content">
      <h1>Welcome to Our Website</h1>
      <p>This version includes a bumble bee image and a referenced background image.</p>
      <img
        class="bee-image"
        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'><rect width='200' height='120' rx='20' fill='%23f9e59f'/><circle cx='60' cy='60' r='22' fill='%23f0c14b'/><circle cx='82' cy='48' r='18' fill='%23f5d66b'/><ellipse cx='95' cy='50' rx='20' ry='12' fill='%23f0a500'/><ellipse cx='80' cy='85' rx='18' ry='10' fill='%236a4f2f'/><circle cx='54' cy='56' r='4' fill='%23000'/><circle cx='70' cy='56' r='4' fill='%23000'/><path d='M95 60 q10 0 20 10' stroke='%23f0a500' stroke-width='6' fill='none' stroke-linecap='round'/><path d='M40 65 q-12 8 -25 4' stroke='%236a4f2f' stroke-width='6' fill='none' stroke-linecap='round'/></svg>"
        alt="Bumble bee illustration"
      />
    </div>

    <footer>
      <p>&copy; 2025 My Website</p>
    </footer>
  </body>
</html>
