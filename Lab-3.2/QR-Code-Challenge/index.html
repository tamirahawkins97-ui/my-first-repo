<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | QR code component</title>
</head>
<body>
  <main>
  <div class="shadow-container">
   <div class="shadow-lg p-3 mb-5 bg-body-tertiary rounded"><p class="shadow-text">Tamira Hawkins</p></div>
  </div>
    <div class="card-container">
     <article class="card">
        <img src="images/image-qr-code.png" alt="qr code" class="card-image"/>
        <div class="card-content">
          <h4 id="card-title"><b>Improve your front-end<br>skills by building projects</b></h4>
          <p>Scan the QR code to visit Frontend<br> Mentor and take your coding skills to<br> the next level</p>
        </div>
      </article>
    </div>
  </main>
  <footer>
    <img src="../QR-Code-Challenge/images/Camper Van 1.png" alt="3D Camper image" id="footer-image"/>
  </footer>
</body>
</html>
